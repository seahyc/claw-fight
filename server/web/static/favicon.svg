<svg viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="left-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="right-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- Impact flash -->
  <polygon points="64,30 68,42 60,42" fill="#ffdd00" opacity="0.9"/>
  <polygon points="64,30 58,38 70,38" fill="#ffdd00" opacity="0.7"/>
  <line x1="64" y1="28" x2="64" y2="20" stroke="#ffdd00" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="64" y1="28" x2="56" y2="22" stroke="#ffdd00" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="64" y1="28" x2="72" y2="22" stroke="#ffdd00" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="64" y1="28" x2="58" y2="16" stroke="#ffdd00" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="64" y1="28" x2="70" y2="16" stroke="#ffdd00" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- LEFT LOBSTER (facing right) -->
  <g transform="translate(-6, 20) scale(0.45)">
    <!-- Body -->
    <path d="M60 10 C30 10 15 35 15 55 C15 75 30 95 45 100 L45 110 L55 110 L55 100 C55 100 60 102 65 100 L65 110 L75 110 L75 100 C90 95 105 75 105 55 C105 35 90 10 60 10Z" fill="url(#left-grad)"/>
    <!-- Left Claw (back, smaller) -->
    <path d="M20 45 C5 40 0 50 5 60 C10 70 20 65 25 55 C28 48 25 45 20 45Z" fill="url(#left-grad)"/>
    <!-- Right Claw (front, reaching toward opponent) -->
    <path d="M100 35 C120 25 135 35 130 50 C125 65 108 60 100 48 C96 42 98 36 100 35Z" fill="url(#left-grad)"/>
    <!-- Antenna -->
    <path d="M45 15 Q35 5 30 8" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round"/>
    <path d="M75 15 Q85 5 90 8" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="45" cy="35" r="6" fill="#050810"/>
    <circle cx="75" cy="35" r="6" fill="#050810"/>
    <circle cx="47" cy="34" r="2.5" fill="#00e5cc"/>
    <circle cx="77" cy="34" r="2.5" fill="#00e5cc"/>
  </g>

  <!-- RIGHT LOBSTER (facing left, mirrored) -->
  <g transform="translate(134, 20) scale(-0.45, 0.45)">
    <!-- Body -->
    <path d="M60 10 C30 10 15 35 15 55 C15 75 30 95 45 100 L45 110 L55 110 L55 100 C55 100 60 102 65 100 L65 110 L75 110 L75 100 C90 95 105 75 105 55 C105 35 90 10 60 10Z" fill="url(#right-grad)"/>
    <!-- Left Claw (back) -->
    <path d="M20 45 C5 40 0 50 5 60 C10 70 20 65 25 55 C28 48 25 45 20 45Z" fill="url(#right-grad)"/>
    <!-- Right Claw (front, reaching toward opponent) -->
    <path d="M100 35 C120 25 135 35 130 50 C125 65 108 60 100 48 C96 42 98 36 100 35Z" fill="url(#right-grad)"/>
    <!-- Antenna -->
    <path d="M45 15 Q35 5 30 8" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round"/>
    <path d="M75 15 Q85 5 90 8" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="45" cy="35" r="6" fill="#050810"/>
    <circle cx="75" cy="35" r="6" fill="#050810"/>
    <circle cx="47" cy="34" r="2.5" fill="#00e5cc"/>
    <circle cx="77" cy="34" r="2.5" fill="#00e5cc"/>
  </g>
</svg>
