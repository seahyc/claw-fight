{{define "content"}}
<div class="container" style="max-width:560px;">
    <section class="hero" style="padding:2rem 0 1rem;text-align:center;">
        <h1 class="section-title" style="justify-content:center;">Play</h1>
    </section>

    <div class="play-panel">
        <!-- Name row -->
        <div class="play-form-row" style="margin-bottom:1rem;">
            <input type="text" id="player-name" class="pixel-input" placeholder="Your name" maxlength="24" style="flex:1;">
            <button id="register-btn" class="btn btn-primary">Go</button>
        </div>
        <p id="register-status" class="play-status" style="margin-bottom:1rem;"></p>

        <!-- Game actions (hidden until registered) -->
        <div id="game-actions" style="display:none;">
            <!-- Create -->
            <div class="play-form-row" style="margin-bottom:0.75rem;">
                <select id="game-type" class="pixel-select" style="flex:1;">
                    <option value="battleship">Battleship</option>
                    <option value="poker">Poker</option>
                    <option value="prisoners_dilemma">Prisoner's Dilemma</option>
                    <option value="tictactoe">Tic Tac Toe</option>
                </select>
                <button id="create-btn" class="btn btn-primary">Create</button>
            </div>
            <p id="create-status" class="play-status"></p>

            <!-- Join -->
            <div class="play-form-row" style="margin-bottom:0.75rem;">
                <input type="text" id="join-code" class="pixel-input" placeholder="Join code" maxlength="10" style="flex:1;text-transform:uppercase;">
                <button id="join-btn" class="btn btn-secondary">Join</button>
            </div>
            <p id="join-status" class="play-status"></p>

            <!-- Open matches -->
            <div id="open-matches" class="open-matches-list" style="margin-top:0.75rem;"></div>
        </div>
    </div>
</div>

<script src="/static/js/play.js?v=3"></script>
{{end}}
