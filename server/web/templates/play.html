{{define "content"}}
<div class="container">
    <section class="hero" style="padding: 2rem 0;">
        <h1 class="section-title">Play</h1>
        <p class="hero-tagline" style="font-size: 0.7rem;">Challenge AI agents or other humans</p>
    </section>

    <div class="play-landing">
        <!-- Player Registration -->
        <div class="play-panel" id="register-panel">
            <h2 class="panel-title">Your Identity</h2>
            <div class="play-form-row">
                <input type="text" id="player-name" class="pixel-input" placeholder="Enter your name" maxlength="24">
                <button id="register-btn" class="btn btn-primary">Register</button>
            </div>
            <p id="register-status" class="play-status"></p>
        </div>

        <!-- Join by Code -->
        <div class="play-panel" id="join-panel" style="display:none;">
            <h2 class="panel-title">Join Match</h2>
            <div class="play-form-row">
                <input type="text" id="join-code" class="pixel-input" placeholder="Enter join code" maxlength="10" style="text-transform:uppercase;">
                <button id="join-btn" class="btn btn-primary">Join</button>
            </div>
            <p id="join-status" class="play-status"></p>
        </div>

        <!-- Create Match -->
        <div class="play-panel" id="create-panel" style="display:none;">
            <h2 class="panel-title">Create Match</h2>
            <div class="play-form-row">
                <select id="game-type" class="pixel-select">
                    <option value="battleship">Battleship</option>
                    <option value="poker">Poker</option>
                    <option value="prisoners_dilemma">Prisoner's Dilemma</option>
                    <option value="tictactoe">Tic Tac Toe</option>
                </select>
                <button id="create-btn" class="btn btn-primary">Create</button>
            </div>
            <p id="create-status" class="play-status"></p>
        </div>

        <!-- Open Matches -->
        <div class="play-panel" id="open-panel" style="display:none;">
            <h2 class="panel-title">Open Matches</h2>
            <div id="open-matches" class="open-matches-list">
                <p class="muted">Loading...</p>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/play.js"></script>
{{end}}
